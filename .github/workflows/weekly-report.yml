name: Weekly Reliability Report

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - .github/workflows/weekly-report.yml
      - generate_weekly_report.py
      - publish_weekly_report_to_pages.py
      - reports/manual-notes-latest.md
      - database.py
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_CUSTOMER: ${{ secrets.DATABASE_URL_CUSTOMER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate database configuration
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL is required"
            exit 1
          fi
          if [ -z "${DATABASE_URL_CUSTOMER}" ]; then
            echo "DATABASE_URL_CUSTOMER is required"
            exit 1
          fi
          if [ "${DATABASE_URL}" = "${DATABASE_URL_CUSTOMER}" ]; then
            echo "DATABASE_URL and DATABASE_URL_CUSTOMER must be different"
            exit 1
          fi

      - name: Lane diagnostics (main)
        env:
          MONITOR_TYPE: main
        run: |
          python -c "from database import SessionLocal, ApiCheck; from sqlalchemy import func; db=SessionLocal(); total=db.query(func.count(ApiCheck.id)).scalar() or 0; providers=sorted([p[0] for p in db.query(ApiCheck.provider).distinct().all() if p[0] is not None]); models=sorted([m[0] for m in db.query(ApiCheck.model).distinct().all() if m[0] is not None]); print(f'MAIN_TOTAL={total}'); print(f\"MAIN_PROVIDERS={','.join(providers) if providers else 'none'}\"); print(f\"MAIN_MODELS={','.join(models) if models else 'none'}\"); db.close()"

      - name: Lane diagnostics (customer)
        env:
          MONITOR_TYPE: customer
        run: |
          python -c "from database import SessionLocal, ApiCheck; from sqlalchemy import func; db=SessionLocal(); total=db.query(func.count(ApiCheck.id)).scalar() or 0; providers=sorted([p[0] for p in db.query(ApiCheck.provider).distinct().all() if p[0] is not None]); models=sorted([m[0] for m in db.query(ApiCheck.model).distinct().all() if m[0] is not None]); print(f'CUSTOMER_TOTAL={total}'); print(f\"CUSTOMER_PROVIDERS={','.join(providers) if providers else 'none'}\"); print(f\"CUSTOMER_MODELS={','.join(models) if models else 'none'}\"); db.close()"

      - name: Generate and publish main report lane
        env:
          MONITOR_TYPE: main
          PAGES_SUBDIR: ""
        run: |
          python generate_weekly_report.py
          cp reports/latest-weekly-report.md reports/latest-weekly-report-main.md
          python publish_weekly_report_to_pages.py

      - name: Generate and publish customer report lane
        env:
          MONITOR_TYPE: customer
          PAGES_SUBDIR: customer
        run: |
          python generate_weekly_report.py
          cp reports/latest-weekly-report.md reports/latest-weekly-report-customer.md
          python publish_weekly_report_to_pages.py

      - name: Add report to workflow summary
        run: |
          echo "## Weekly Reliability Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Main lane" >> "$GITHUB_STEP_SUMMARY"
          cat reports/latest-weekly-report-main.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Customer lane" >> "$GITHUB_STEP_SUMMARY"
          cat reports/latest-weekly-report-customer.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reliability-report
          path: |
            reports/latest-weekly-report-main.md
            reports/latest-weekly-report-customer.md

      - name: Create Pull Request with report updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: publish weekly report"
          title: "chore: publish weekly reliability report (${{ github.ref_name }})"
          body: |
            Automated weekly report updates.

            Includes:
            - Main lane weekly Markdown report in `reports/latest-weekly-report-main.md`
            - Customer lane weekly Markdown report in `reports/latest-weekly-report-customer.md`
            - GitHub Pages archive updates in `docs/` and `docs/customer/`
          branch: automation/weekly-report-to-${{ github.ref_name }}
          base: main
          delete-branch: true
          add-paths: |
            docs/**
            reports/manual-notes-latest.md
