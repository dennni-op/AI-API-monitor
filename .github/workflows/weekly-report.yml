name: Weekly Reliability Report

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate weekly report
        run: python generate_weekly_report.py

      - name: Publish report for GitHub Pages
        run: python publish_weekly_report_to_pages.py

      - name: Add report to workflow summary
        run: |
          echo "## Weekly Reliability Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat reports/latest-weekly-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reliability-report
          path: reports/latest-weekly-report.md

      - name: Create Pull Request with report updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: publish weekly report"
          title: "chore: publish weekly reliability report"
          body: |
            Automated weekly report updates.

            Includes:
            - Latest Markdown report in `reports/latest-weekly-report.md`
            - GitHub Pages archive updates in `docs/`
          branch: automation/weekly-report
          delete-branch: true
          add-paths: |
            docs/**
            reports/latest-weekly-report.md
